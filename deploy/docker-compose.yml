services:
  redis:
    image: redis:7
    container_name: pr14-redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    container_name: pr14-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: pr14-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 12

  auth:
    build:
      context: ..
      dockerfile: services/auth/Dockerfile
    container_name: pr14-auth
    command: ["/bin/auth"]
    env_file:
      - .env
    environment:
      AUTH_PORT: ${AUTH_PORT}
      AUTH_GRPC_PORT: ${AUTH_GRPC_PORT}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  tasks_1:
    build:
      context: ..
      dockerfile: services/tasks/Dockerfile
    container_name: pr14-tasks-1
    command: ["/bin/tasks"]
    env_file:
      - .env
    environment:
      INSTANCE_ID: tasks-1
      TASKS_PORT: ${TASKS_PORT}
      AUTH_GRPC_ADDR: ${AUTH_GRPC_ADDR}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_ADDR: ${REDIS_ADDR}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS}
      CACHE_TTL_JITTER_SECONDS: ${CACHE_TTL_JITTER_SECONDS}
      RABBIT_URL: ${RABBIT_URL}
      QUEUE_NAME: ${QUEUE_NAME}
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  tasks_2:
    build:
      context: ..
      dockerfile: services/tasks/Dockerfile
    container_name: pr14-tasks-2
    command: ["/bin/tasks"]
    env_file:
      - .env
    environment:
      INSTANCE_ID: tasks-2
      TASKS_PORT: ${TASKS_PORT}
      AUTH_GRPC_ADDR: ${AUTH_GRPC_ADDR}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_ADDR: ${REDIS_ADDR}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS}
      CACHE_TTL_JITTER_SECONDS: ${CACHE_TTL_JITTER_SECONDS}
      RABBIT_URL: ${RABBIT_URL}
      QUEUE_NAME: ${QUEUE_NAME}
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  worker:
    build:
      context: ..
      dockerfile: services/worker/Dockerfile
    container_name: pr14-worker
    command: ["/bin/worker"]
    env_file:
      - .env
    environment:
      RABBIT_URL: ${RABBIT_URL}
      QUEUE_NAME: ${QUEUE_NAME}
      WORKER_PREFETCH: ${WORKER_PREFETCH}
    depends_on:
      rabbitmq:
        condition: service_healthy

  nginx:
    image: nginx:latest
    container_name: pr14-nginx
    ports:
      - "8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cert.pem:/etc/nginx/tls/cert.pem:ro
      - ./key.pem:/etc/nginx/tls/key.pem:ro
    depends_on:
      tasks_1:
        condition: service_started
      tasks_2:
        condition: service_started
      auth:
        condition: service_started
      graphql:
        condition: service_started

  graphql:
    build:
      context: ..
      dockerfile: services/graphql/Dockerfile
    container_name: pr14-graphql
    env_file:
      - .env
    environment:
      INSTANCE_ID: graphql
      GRAPHQL_PORT: ${GRAPHQL_PORT}
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
